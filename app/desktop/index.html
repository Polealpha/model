<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EmoResonance</title>
    <script defer src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #0F172A;
        --theme-text: #F8FAFC;
        --theme-muted: #94A3B8;
        --theme-faint: rgba(248, 250, 252, 0.5);
        --accent: #6366f1;
        --accent-soft: rgba(99, 102, 241, 0.2);
        --accent-soft-strong: rgba(99, 102, 241, 0.35);
        --panel-bg: rgba(12, 18, 34, 0.5);
        --panel-bg-strong: rgba(10, 15, 29, 0.85);
        --panel-border: rgba(255, 255, 255, 0.05);
        --chip-bg: rgba(99, 102, 241, 0.08);
        --chip-border: rgba(99, 102, 241, 0.2);
        --chip-text: #94A3B8;
        --chart-accent: #6366f1;
        --chart-grid: rgba(255, 255, 255, 0.06);
        --chart-tick: #475569;
        --chart-tooltip-bg: rgba(7, 11, 20, 0.95);
        --chart-tooltip-border: rgba(255, 255, 255, 0.05);
        --aurora-bg: radial-gradient(circle at 50% 50%, #1e1b4b, #0f172a);
        --aurora-blob-1: #4f46e5;
        --aurora-blob-2: #c026d3;
        --aurora-blob-3: #0ea5e9;
        --top-pill-bg: rgba(99, 102, 241, 0.08);
        --top-pill-border: rgba(99, 102, 241, 0.3);
        --top-pill-text: #94A3B8;
        --top-pill-shadow: 0 12px 30px rgba(15, 23, 42, 0.3);
        --top-btn-bg: rgba(255, 255, 255, 0.06);
        --top-btn-bg-hover: rgba(255, 255, 255, 0.12);
        --top-btn-border: rgba(255, 255, 255, 0.1);
        --top-btn-text: #94A3B8;
        --top-btn-text-hover: #F8FAFC;
        --top-icon: #94A3B8;
        --top-icon-hover: #F8FAFC;
        --status-online: var(--accent);
        --status-offline: #f59e0b;
      }
      body {
        font-family: 'Nunito', sans-serif;
        background-color: var(--bg-color);
        color: var(--theme-text);
        -webkit-tap-highlight-color: transparent;
        overflow: hidden; /* Prevent body scroll, handle in app */
      }
      /* Custom scrollbar for clean UI */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      
      /* Q-bouncy transition class - Exaggerated Spring Physics */
      .q-bounce {
        transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                    background-color 0.3s ease, 
                    box-shadow 0.3s ease;
      }
      .q-bounce:hover {
        transform: scale(1.05);
      }
      .q-bounce:active {
        transform: scale(0.92);
      }

      /* Aurora Background Animation */
      .aurora-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background: var(--aurora-bg);
        overflow: hidden;
      }
      .aurora-blob {
        position: absolute;
        filter: blur(80px);
        opacity: 0.6;
        animation: float 10s infinite alternate cubic-bezier(0.4, 0.0, 0.2, 1);
        will-change: transform;
      }
      .blob-1 {
        top: -10%;
        left: -10%;
        width: 50vw;
        height: 50vw;
        background: var(--aurora-blob-1);
        animation-delay: 0s;
      }
      .blob-2 {
        bottom: -10%;
        right: -10%;
        width: 60vw;
        height: 60vw;
        background: var(--aurora-blob-2);
        animation-delay: -5s;
      }
      .blob-3 {
        top: 40%;
        left: 40%;
        width: 40vw;
        height: 40vw;
        background: var(--aurora-blob-3);
        animation-duration: 15s;
      }

      @keyframes float {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(20px, 40px) scale(1.1); }
      }

      /* Card Entrance Animation - Pop In */
      @keyframes popIn {
        0% { opacity: 0; transform: scale(0.5) translateY(40px); }
        70% { transform: scale(1.05) translateY(-10px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      .animate-pop-in {
        animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        opacity: 0; /* Start hidden */
      }

      /* Continuous Floating for Emojis */
      @keyframes float-y {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      .animate-float {
        animation: float-y 3s ease-in-out infinite;
      }
      
      /* Pulse Glow */
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }
        50% { box-shadow: 0 0 25px rgba(99, 102, 241, 0.6); }
      }
      .animate-pulse-glow {
        animation: pulse-glow 2s infinite;
      }

      .theme-pill {
        background: var(--top-pill-bg);
        border: 1px solid var(--top-pill-border);
        color: var(--top-pill-text);
        box-shadow: var(--top-pill-shadow);
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        box-shadow: 0 0 10px var(--status-online);
        background: var(--status-online);
      }
      .status-dot--offline {
        background: var(--status-offline);
        box-shadow: 0 0 10px var(--status-offline);
      }
      .theme-button {
        background: var(--top-btn-bg);
        border: 1px solid var(--top-btn-border);
        color: var(--top-btn-text);
      }
      .theme-button:hover {
        background: var(--top-btn-bg-hover);
        color: var(--top-btn-text-hover);
      }
      .theme-icon-button {
        color: var(--top-icon);
      }
      .theme-icon-button:hover {
        color: var(--top-icon-hover);
      }

      body.float-mode {
        background: transparent;
      }
      body.float-mode #root {
        width: 100%;
        height: 100%;
      }
      .float-widget-shell {
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .float-widget-button {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        border: 1px solid var(--panel-border);
        background: var(--panel-bg-strong);
        color: var(--accent);
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
        cursor: grab;
        overflow: hidden;
      }
      .float-widget-button:active {
        cursor: grabbing;
      }
      .float-widget-button--dragging {
        box-shadow: 0 0 0 2px var(--accent-soft-strong), 0 24px 60px rgba(0, 0, 0, 0.45);
      }
      .float-widget-button:hover {
        box-shadow: 0 24px 50px rgba(0, 0, 0, 0.4);
      }
      .float-chat-panel {
        width: 430px;
        height: 520px;
        border-radius: 26px;
        background: var(--panel-bg-strong);
        border: 1px solid var(--panel-border);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        backdrop-filter: blur(16px);
        transform-origin: 100% 100%;
        animation: floatExpand 0.28s ease forwards;
        -webkit-app-region: no-drag;
      }
      .float-chat-header {
        height: 42px;
        padding: 0 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(0, 0, 0, 0.2);
        border-bottom: 1px solid var(--panel-border);
        color: var(--theme-muted);
      }
      .float-chat-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 12px var(--accent);
      }
      .float-chat-close {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        border: 1px solid var(--panel-border);
        background: transparent;
        color: var(--theme-muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s ease, border-color 0.2s ease;
        -webkit-app-region: no-drag;
      }
      .float-chat-close:hover {
        color: var(--theme-text);
        border-color: var(--accent-soft-strong);
      }

      @keyframes floatExpand {
        0% { opacity: 0; transform: scale(0.2) translate(40px, 40px); }
        100% { opacity: 1; transform: scale(1) translate(0, 0); }
      }

      body.theme-variant [class*="bg-[#070b14]"] { background-color: var(--bg-color) !important; }
      body.theme-variant [class*="bg-[#0a0f1d]"] { background-color: var(--panel-bg-strong) !important; }
      body.theme-variant [class*="bg-[#0c1222]"] { background-color: var(--panel-bg) !important; }

      body.theme-variant [class*="bg-slate-900"] { background-color: var(--panel-bg-strong) !important; }

      body.theme-variant [class*="bg-white/10"] { background-color: var(--panel-bg-strong) !important; }
      body.theme-variant [class*="text-slate-200"],
      body.theme-variant [class*="text-slate-300"] { color: var(--theme-text) !important; }
      body.theme-variant [class*="text-slate-400"] { color: var(--theme-muted) !important; }

      body.theme-variant [class*="text-slate-600"] { color: var(--theme-muted) !important; }
      body.theme-variant [class*="text-white/50"] { color: var(--theme-muted) !important; }
      body.theme-variant [class*="text-white/20"] { color: var(--theme-faint) !important; }
      body.theme-variant [class*="text-indigo-400"],
      body.theme-variant [class*="text-indigo-300"],
      body.theme-variant [class*="text-indigo-200"] { color: var(--accent) !important; }

      body.theme-variant [class*="border-indigo-400"] { border-color: var(--accent-soft-strong) !important; }
      body.theme-variant [class*="border-white/"] { border-color: var(--panel-border) !important; }
      body.theme-variant [class*="text-indigo-400/50"] { color: var(--theme-faint) !important; }
