trimodal_model:
  batch_size: 256
  hidden_dim: 384
  epochs: 18
  lr: 0.0002
  weight_decay: 0.0001
  dropout: 0.1
  num_layers: 4
  num_heads: 8
  label_smoothing: 0.03
  va_loss_weight: 0.3
  state_loss_weight: 0.2
  support_loss_weight: 0.1
  grad_clip: 1.0
  seed: 42
  device: cuda
  multi_gpu: true
